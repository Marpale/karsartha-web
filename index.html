<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karsartha — Kakanda Verdicts</title>
<style>
  :root {
    --bg: #0e1116;
    --surface: #161b22;
    --surface-2: #1f262e;
    --border: #2a313b;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --buy: #2ea043;
    --wait: #d29922;
    --avoid: #da3633;
  }
  [data-theme="light"] {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface-2: #eef1f4;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #57606a;
    --accent: #0969da;
    --buy: #1a7f37;
    --wait: #9a6700;
    --avoid: #cf222e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; gap: 12px; flex-wrap: wrap;
  }
  h1 { font-size: 1.4rem; margin: 0; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  .theme-btn {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-size: 0.9rem;
  }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 16px; }
  .chip {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-label {
    color: var(--muted); font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.05em; margin-right: 4px; align-self: center;
  }
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1000px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ticker { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
  .tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 999px;
    background: var(--surface-2); color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .verdict {
    margin-left: auto;
    font-size: 0.75rem; font-weight: 700; padding: 4px 10px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .verdict.BUY { background: var(--buy); color: #fff; }
  .verdict.WAIT { background: var(--wait); color: #fff; }
  .verdict.AVOID { background: var(--avoid); color: #fff; }
  .stale-pill {
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em;
    margin-left: 6px;
  }
  .stale-pill.stale { background: #d29922; color: #1f2328; }
  .stale-pill.very-stale { background: #cf222e; color: #fff; }
  .name { color: var(--muted); font-size: 0.9rem; }
  .price-row {
    display: flex; gap: 16px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 0; font-size: 0.85rem;
  }
  .price-row > div { display: flex; flex-direction: column; }
  .price-row .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; }
  .price-row .val { font-weight: 600; }
  .anchor-note {
    font-size: 0.7rem; color: var(--muted); font-style: italic;
    margin-bottom: 8px;
  }
  .summary { font-size: 0.9rem; }
  .toggle {
    background: none; border: none; color: var(--accent);
    cursor: pointer; padding: 0; font-size: 0.85rem; text-align: left;
    align-self: flex-start;
  }
  .toggle:hover { text-decoration: underline; }
  .details { display: none; margin-top: 4px; }
  .details.open { display: block; }
  .metrics-table {
    width: 100%; border-collapse: collapse; margin-bottom: 12px;
    font-size: 0.85rem;
  }
  .metrics-table td {
    padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .metrics-table td:first-child { color: var(--muted); }
  .metrics-table td:last-child { text-align: right; font-weight: 600; }
  .metrics-table tr:last-child td { border-bottom: none; }
  .learnings { font-size: 0.85rem; }
  .learnings h4 {
    margin: 8px 0 4px; font-size: 0.75rem;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .learnings ul { margin: 0; padding-left: 18px; }
  .learnings li { margin-bottom: 4px; }
  .source {
    margin-top: 10px; font-size: 0.75rem; color: var(--muted);
  }
  .source a { color: var(--accent); text-decoration: none; }
  .source a:hover { text-decoration: underline; }
  .empty {
    text-align: center; padding: 40px; color: var(--muted);
  }
  .view-tabs {
    display: flex; gap: 4px; margin: 8px 0 4px;
    border-bottom: 1px solid var(--border);
  }
  .view-tab {
    background: none; border: none; color: var(--muted);
    padding: 10px 18px; cursor: pointer; font-size: 0.95rem;
    font-weight: 600; border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    color: var(--accent); border-bottom-color: var(--accent);
  }
  .letter-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .letter-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .letter-num {
    font-size: 0.75rem; font-weight: 700; padding: 3px 10px;
    border-radius: 999px; background: var(--accent); color: #fff;
    letter-spacing: 0.04em;
  }
  .letter-title { font-size: 1.1rem; font-weight: 700; flex: 1; min-width: 200px; }
  .letter-date { color: var(--muted); font-size: 0.85rem; }
  .letter-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .letter-tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 999px;
    background: var(--surface-2); color: var(--muted);
  }
  .letter-summary { font-size: 0.9rem; }
  .letter-grid { grid-template-columns: 1fr; }
  @media (min-width: 800px) { .letter-grid { grid-template-columns: 1fr 1fr; } }
  footer {
    text-align: center; color: var(--muted); font-size: 0.75rem;
    padding: 24px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Karsartha — Kakanda Verdicts</h1>
      <div class="sub">Two-gate verdicts from worked case studies. Andhika Diskartes · Lalu Deo framework.</div>
    </div>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">Light</button>
  </header>

  <div class="view-tabs" id="viewTabs">
    <button class="view-tab active" data-view="emiten">Emiten</button>
    <button class="view-tab" data-view="letters">Letters</button>
  </div>

  <div class="filters" id="sectorFilters">
    <span class="filter-label">Sector</span>
    <button class="chip active" data-sector="all">All</button>
    <button class="chip" data-sector="banking">Banking</button>
    <button class="chip" data-sector="consumer">Consumer</button>
    <button class="chip" data-sector="commodity">Commodity</button>
    <button class="chip" data-sector="infrastructure-and-property">Infrastructure and Property</button>
    <button class="chip" data-sector="logistic-and-transportation">Logistic and Transportation</button>
  </div>
  <div class="filters" id="verdictFilters">
    <span class="filter-label">Verdict</span>
    <button class="chip active" data-verdict="all">All</button>
    <button class="chip" data-verdict="BUY">Buy</button>
    <button class="chip" data-verdict="WAIT">Wait</button>
    <button class="chip" data-verdict="AVOID">Avoid</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No matches.</div>

  <footer>Data hand-curated from case_studies/*.md. Source files in repo.</footer>
</div>

<script>
let ENTITIES = [];
let LETTERS = [];
fetch('entities.json').then(r => r.json()).then(data => {
  ENTITIES = data;
  render();
});
fetch('letters.json').then(r => r.json()).then(data => {
  LETTERS = data;
  if (activeView === "letters") render();
});
const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
const sectorFilters = document.getElementById("sectorFilters");
const verdictFilters = document.getElementById("verdictFilters");
let activeSector = "all";
let activeVerdict = "all";
let activeView = "emiten";

function staleness(validatedOn) {
  if (!validatedOn) return null;
  const d = new Date(validatedOn);
  if (isNaN(d)) return null;
  const days = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
  if (days >= 365) return { cls: "very-stale", label: `stale ${days}d` };
  if (days >= 180) return { cls: "stale", label: `stale ${days}d` };
  return null;
}

function render() {
  if (activeView === "letters") return renderLetters();
  sectorFilters.style.display = "";
  verdictFilters.style.display = "";
  grid.classList.remove("letter-grid");
  const filtered = ENTITIES.filter(e =>
    (activeSector === "all" || e.sector === activeSector) &&
    (activeVerdict === "all" || e.verdict === activeVerdict)
  );
  grid.innerHTML = filtered.map((e, i) => {
    const s = staleness(e.validatedOn);
    const stalePill = s ? `<span class="stale-pill ${s.cls}" title="Validated on ${e.validatedOn}">${s.label}</span>` : "";
    return `
    <article class="card" data-sector="${e.sector}" data-verdict="${e.verdict}">
      <div class="card-head">
        <span class="ticker">${e.ticker}</span>
        <span class="tag">${e.sectorLabel}</span>
        <span class="verdict ${e.verdict}">${e.verdict}</span>${stalePill}
      </div>
      <div class="name">${e.name}</div>
      <div class="price-row">
        <div><span class="label">Price</span><span class="val">${e.price}</span></div>
        <div><span class="label">Market cap</span><span class="val">${e.mcap}</span></div>
        ${e.sector === "banking" ? (() => { const m = e.metrics.find(([k]) => k.includes("P/BV")); return m ? `<div><span class="label">P/BV</span><span class="val">${m[1]}</span></div>` : ""; })() : ""}
        <div><span class="label">As of</span><span class="val">${e.asOf}</span></div>
      </div>
      <div class="summary">${e.summary}</div>
      <button class="toggle" data-i="${i}">See more ▾</button>
      <div class="details" id="details-${i}">
        <div class="anchor-note">Metrics anchored at price/mcap above (${e.asOf}).</div>
        <table class="metrics-table">
          ${e.metrics.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}
        </table>
        <div class="learnings">
          <h4>Strengths</h4>
          <ul>${e.strengths.map(s => `<li>${s}</li>`).join("")}</ul>
          <h4>Risks</h4>
          <ul>${e.risks.map(r => `<li>${r}</li>`).join("")}</ul>
        </div>
        <div class="source">Source: <a href="${e.file}">${e.ticker.toLowerCase()}.md</a></div>
      </div>
    </article>
  `;
  }).join("");
  empty.style.display = filtered.length ? "none" : "block";
  document.querySelectorAll(".toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = btn.dataset.i;
      const d = document.getElementById(`details-${i}`);
      d.classList.toggle("open");
      btn.textContent = d.classList.contains("open") ? "See less ▴" : "See more ▾";
    });
  });
}

function renderLetters() {
  sectorFilters.style.display = "none";
  verdictFilters.style.display = "none";
  grid.classList.add("letter-grid");
  const sorted = [...LETTERS].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  grid.innerHTML = sorted.map((l, i) => {
    const tags = (l.tags || []).map(t => `<span class="letter-tag">${t}</span>`).join("");
    const macro = (l.macro || []).length
      ? `<h4>Macro</h4><ul>${l.macro.map(x => `<li>${x}</li>`).join("")}</ul>` : "";
    const open = (l.openQuestions || []).length
      ? `<h4>Open questions</h4><ul>${l.openQuestions.map(x => `<li>${x}</li>`).join("")}</ul>` : "";
    return `
    <article class="letter-card">
      <div class="letter-head">
        <span class="letter-num">#${l.number}</span>
        <span class="letter-title">${l.title}</span>
        <span class="letter-date">${l.dateLabel || l.date}</span>
      </div>
      <div class="letter-tags">${tags}</div>
      <div class="letter-summary">${l.summary}</div>
      <button class="toggle" data-li="${i}">See more ▾</button>
      <div class="details" id="ldetails-${i}">
        ${macro}
        <div class="learnings">
          <h4>Key learnings</h4>
          <ul>${(l.learnings || []).map(x => `<li>${x}</li>`).join("")}</ul>
          ${open}
        </div>
        <div class="source">By ${l.author} · <a href="${l.sourceFile}" target="_blank" rel="noopener">source</a></div>
      </div>
    </article>`;
  }).join("");
  empty.style.display = sorted.length ? "none" : "block";
  document.querySelectorAll('.toggle[data-li]').forEach(btn => {
    btn.addEventListener("click", () => {
      const i = btn.dataset.li;
      const d = document.getElementById(`ldetails-${i}`);
      d.classList.toggle("open");
      btn.textContent = d.classList.contains("open") ? "See less ▴" : "See more ▾";
    });
  });
}

document.getElementById("viewTabs").addEventListener("click", (e) => {
  if (!e.target.matches(".view-tab")) return;
  document.querySelectorAll("#viewTabs .view-tab").forEach(t => t.classList.remove("active"));
  e.target.classList.add("active");
  activeView = e.target.dataset.view;
  render();
});

document.getElementById("sectorFilters").addEventListener("click", (e) => {
  if (!e.target.matches(".chip")) return;
  document.querySelectorAll("#sectorFilters .chip").forEach(c => c.classList.remove("active"));
  e.target.classList.add("active");
  activeSector = e.target.dataset.sector;
  render();
});
document.getElementById("verdictFilters").addEventListener("click", (e) => {
  if (!e.target.matches(".chip")) return;
  document.querySelectorAll("#verdictFilters .chip").forEach(c => c.classList.remove("active"));
  e.target.classList.add("active");
  activeVerdict = e.target.dataset.verdict;
  render();
});

const themeBtn = document.getElementById("themeBtn");
const stored = localStorage.getItem("karsartha-theme");
if (stored === "light") {
  document.documentElement.setAttribute("data-theme", "light");
  themeBtn.textContent = "Dark";
}
themeBtn.addEventListener("click", () => {
  const isLight = document.documentElement.getAttribute("data-theme") === "light";
  if (isLight) {
    document.documentElement.removeAttribute("data-theme");
    themeBtn.textContent = "Light";
    localStorage.setItem("karsartha-theme", "dark");
  } else {
    document.documentElement.setAttribute("data-theme", "light");
    themeBtn.textContent = "Dark";
    localStorage.setItem("karsartha-theme", "light");
  }
});

render();
</script>
</body>
</html>
